# Fails CI if deploy.yml reintroduces DB secret injection or .env sync from GitHub.
name: Deploy workflow guard

on:
  pull_request:
    paths:
      - '.github/workflows/deploy.yml'
  push:
    branches: [main, beta/beta]
    paths:
      - '.github/workflows/deploy.yml'

jobs:
  forbid-db-env-from-secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy must not override server DB env from GitHub
        run: |
          set -euo pipefail
          f=.github/workflows/deploy.yml
          for needle in 'secrets.DATABASE' 'secrets.DIRECT' 'sync-db-env'; do
            if grep -qF "$needle" "$f"; then
              echo "::error::Forbidden in deploy.yml: $needle — server .env is the only source for DB URLs; do not sync from GitHub Secrets"
              exit 1
            fi
          done
          echo "OK: deploy guard passed"
