# Blocks accidental DB secret injection into the main deploy job.
name: Deploy guard

on:
  pull_request:
    paths:
      - '.github/workflows/deploy.yml'
  push:
    branches: [main, beta/beta]
    paths:
      - '.github/workflows/deploy.yml'

jobs:
  deploy-must-not-use-db-secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Block DATABASE_* GitHub Secrets in deploy.yml
        run: |
          set -euo pipefail
          f=.github/workflows/deploy.yml
          for needle in 'secrets.DATABASE' 'secrets.DIRECT' 'sync-db-env'; do
            if grep -qF "$needle" "$f"; then
              echo "::error::Forbidden in deploy.yml: $needle — DB env is server-only; use workflow 'Manual sync database env' if needed"
              exit 1
            fi
          done
          echo "OK"
