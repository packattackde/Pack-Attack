name: Deploy to Production

# --- Database / .env policy (read before changing this file) ---
# Production DATABASE_URL and DIRECT_DATABASE_URL live in
# /var/www/packattack/app/.env on the server. Do NOT add CI steps that
# overwrite them from GitHub Secrets unless you have verified those secrets
# match production and escaping cannot corrupt passwords/URLs.
# A previous approach merged secrets into .env on every deploy and replaced
# a working DSN, causing Prisma P1001 site-wide. d73d262 and earlier never
# touched DB URLs from CI — keep it that way unless you opt in deliberately.
# GitHub Secrets can still store copies for other workflows; they must not
# silently replace the server file during deploy.
# ---------------------------------------------------------------

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_IP }}
          username: packattack
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/packattack/app

            # Clean stale build artifacts before git operations
            sudo rm -rf .next.old.* 2>/dev/null || true

            # Pull latest code
            git fetch origin main
            git reset --hard origin/main
            git clean -fd
            npm ci
            npx prisma generate
            npx prisma db push --accept-data-loss

            # Add CRON_SECRET if not exists
            if ! grep -q "CRON_SECRET" .env; then
              echo "CRON_SECRET=\"$(openssl rand -base64 32)\"" >> .env
            fi

            # Build into a fresh directory to avoid root-owned file conflicts
            rm -rf .next-fresh
            NEXT_DIST_DIR=.next-fresh npm run build

            # Swap the fresh build into place
            mv .next ".next.old.$(date +%s)" 2>/dev/null || true
            mv .next-fresh .next

            # Reload PM2
            if pm2 reload ecosystem.config.cjs --update-env 2>/dev/null; then
              echo "PM2 reloaded successfully"
            else
              echo "PM2 reload failed, doing fresh start..."
              pm2 delete packattack 2>/dev/null || true
              fuser -k 3000/tcp 2>/dev/null || true
              sleep 3
              pm2 start ecosystem.config.cjs
            fi

            if pm2 describe battle-scheduler > /dev/null 2>&1; then
              pm2 reload ecosystem.battle-scheduler.config.cjs --update-env
            else
              pm2 start ecosystem.battle-scheduler.config.cjs
            fi

            pm2 save

            # Show status
            sleep 5
            pm2 status
            echo "✓ Deployment complete"
