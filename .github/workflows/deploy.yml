name: Deploy to Production

# Production DATABASE_URL / DIRECT_DATABASE_URL: only in /var/www/packattack/app/.env on the server.
# Deploys from branch beta/beta only (not main).

on:
  push:
    branches: [beta/beta]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_IP }}
          username: packattack
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/packattack/app

            # Clean stale build artifacts before git operations
            sudo rm -rf .next.old.* 2>/dev/null || true

            # Pull latest code
            git fetch origin beta/beta
            git reset --hard origin/beta/beta
            git clean -fd
            npm ci
            npx prisma generate

            # Build first (does not require a live DB for this app); migrations need DB
            rm -rf .next-fresh
            NEXT_DIST_DIR=.next-fresh npm run build

            # Production migrations (uses DATABASE_URL from server .env only — never from GitHub)
            if ! npx prisma migrate deploy; then
              echo "WARNING: prisma migrate deploy failed — database unreachable or migration error."
              echo "   Code build is already done; when PostgreSQL is reachable run on the server:"
              echo "   cd /var/www/packattack/app && npx prisma migrate deploy && pm2 reload packattack --update-env"
            fi

            # Add CRON_SECRET if not exists
            if ! grep -q "CRON_SECRET" .env; then
              echo "CRON_SECRET=\"$(openssl rand -base64 32)\"" >> .env
            fi

            # Swap the fresh build into place
            mv .next ".next.old.$(date +%s)" 2>/dev/null || true
            mv .next-fresh .next

            # Reload PM2
            if pm2 reload ecosystem.config.cjs --update-env 2>/dev/null; then
              echo "PM2 reloaded successfully"
            else
              echo "PM2 reload failed, doing fresh start..."
              pm2 delete packattack 2>/dev/null || true
              fuser -k 3000/tcp 2>/dev/null || true
              sleep 3
              pm2 start ecosystem.config.cjs
            fi

            if pm2 describe battle-scheduler > /dev/null 2>&1; then
              pm2 reload ecosystem.battle-scheduler.config.cjs --update-env
            else
              pm2 start ecosystem.battle-scheduler.config.cjs
            fi

            pm2 save

            # Show status
            sleep 5
            pm2 status
            echo "✓ Deployment complete"
