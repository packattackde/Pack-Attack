name: Deploy to Production

# The deploy job must NEVER pass DATABASE_URL / DIRECT_DATABASE_URL from GitHub Secrets
# into SSH or rewrite those keys in .env. Production DB URLs live only in server .env.
# To apply the same URLs as in GitHub Secrets, run workflow "Manual: sync database URLs…".

on:
  push:
    branches: [main, beta/beta]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_IP }}
          username: packattack
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 45m
          script: |
            cd /var/www/packattack/app
            REF="${{ github.ref_name }}"

            # Clean stale build artifacts before git operations
            sudo rm -rf .next.old.* 2>/dev/null || true

            # Deploy the branch that triggered this workflow (main or beta/beta)
            git fetch origin "$REF"
            git reset --hard "origin/$REF"
            git clean -fd
            npm ci
            npx prisma generate
            npx prisma db push --accept-data-loss

            # Append-only — do not replace existing keys
            if ! grep -q "CRON_SECRET" .env; then
              echo "CRON_SECRET=\"$(openssl rand -base64 32)\"" >> .env
            fi

            # Build into a fresh directory to avoid root-owned file conflicts
            rm -rf .next-fresh
            NEXT_DIST_DIR=.next-fresh npm run build

            # Swap the fresh build into place
            mv .next ".next.old.$(date +%s)" 2>/dev/null || true
            mv .next-fresh .next

            # Reload PM2
            if pm2 reload ecosystem.config.cjs --update-env 2>/dev/null; then
              echo "PM2 reloaded successfully"
            else
              echo "PM2 reload failed, doing fresh start..."
              pm2 delete packattack 2>/dev/null || true
              fuser -k 3000/tcp 2>/dev/null || true
              sleep 3
              pm2 start ecosystem.config.cjs
            fi

            if pm2 describe battle-scheduler > /dev/null 2>&1; then
              pm2 reload ecosystem.battle-scheduler.config.cjs --update-env
            else
              pm2 start ecosystem.battle-scheduler.config.cjs
            fi

            pm2 save

            sleep 5
            pm2 status
            echo "✓ Deployment complete"
