# Manual ONLY: applies DATABASE_URL + DIRECT_DATABASE_URL from GitHub Secrets to the server .env.
# Never wired into deploy — run from Actions when you need to align server with repo secrets.
name: "Manual: sync database URLs from GitHub Secrets to server"

on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Write GitHub Secrets into server .env and reload PM2
        uses: appleboy/ssh-action@v1.0.0
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_DATABASE_URL: ${{ secrets.DIRECT_DATABASE_URL }}
        with:
          host: ${{ secrets.SERVER_IP }}
          username: packattack
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 10m
          envs: DATABASE_URL,DIRECT_DATABASE_URL
          script: |
            set -e
            cd /var/www/packattack/app
            cp .env ".env.before-manual-sync-$(date +%s)"
            git fetch origin main 'beta/beta' 2>/dev/null || git fetch origin
            OK=0
            for ref in origin/main "origin/beta/beta"; do
              if git show "${ref}:scripts/merge-db-env.py" > /tmp/merge-db-env.py 2>/dev/null && test -s /tmp/merge-db-env.py; then
                echo "Using merge script from $ref"
                OK=1
                break
              fi
            done
            test "$OK" = 1
            python3 /tmp/merge-db-env.py
            npx prisma migrate status
            pm2 reload packattack --update-env 2>/dev/null || pm2 restart packattack --update-env
